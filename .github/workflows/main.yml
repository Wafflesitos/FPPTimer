name: Build FPPTimer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        run: mvn package -B -f FPPTimer/pom.xml
      - uses: actions/upload-artifact@v4
        with:
          name: FPPTimer
          path: FPPTimer/target/FPPTimer.jar
